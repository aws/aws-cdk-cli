# ~~ Generated by projen. To modify, edit .projenrc.ts and run "yarn projen".

name: build
on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - main
  merge_group: {}
jobs:
  build:
    runs-on: aws-cdk_ubuntu-latest_16-core
    permissions:
      contents: write
    outputs:
      self_mutation_happened: ${{ steps.self_mutation.outputs.self_mutation_happened }}
    env:
      CI: "true"
      NX_SKIP_NX_CACHE: ${{ github.ref == 'refs/heads/main' || github.event_name == 'merge_group' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Restore NX cache
        if: ${{ !(github.ref == 'refs/heads/main' || github.event_name == 'merge_group') }}
        uses: actions/cache/restore@v5
        with:
          path: .nx/cache
          key: nx-${{ github.sha }}
          restore-keys: nx-
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies
        run: yarn install --no-immutable
      - name: Set git identity
        run: |-
          git config --global user.name "aws-cdk-cli"
          git config --global user.email "noreply@example.com"
      - name: build
        run: yarn projen build
      - name: Find mutations
        id: self_mutation
        run: |-
          git add .
          git diff --staged --patch --exit-code > repo.patch || echo "self_mutation_happened=true" >> $GITHUB_OUTPUT
        shell: bash
        working-directory: ./
      - name: Upload patch
        if: steps.self_mutation.outputs.self_mutation_happened
        uses: actions/upload-artifact@v7
        with:
          name: repo.patch
          path: repo.patch
          overwrite: true
      - name: Fail build on mutation
        if: steps.self_mutation.outputs.self_mutation_happened
        run: |-
          echo "::error::Files were changed during build (see build log). If this was triggered from a fork, you will need to update your branch."
          cat repo.patch
          exit 1
      - name: Save NX cache
        if: ${{ !(github.event_name == 'merge_group') && always() }}
        uses: actions/cache/save@v5
        with:
          path: .nx/cache
          key: nx-${{ github.sha }}
